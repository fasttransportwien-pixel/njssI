<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80" role="img" aria-label="Blumenbar Floristik &amp; Deko">
  <rect x="0" y="0" width="240" height="80" rx="8" fill="#3f4651"/>
  <!-- 5-petal flower -->
  <g transform="translate(40 40)" fill="#f6a528">
    <ellipse cx="0" cy="-15" rx="7" ry="14"/>
    <ellipse cx="0" cy="-15" rx="7" ry="14" transform="rotate(72)"/>
    <ellipse cx="0" cy="-15" rx="7" ry="14" transform="rotate(144)"/>
    <ellipse cx="0" cy="-15" rx="7" ry="14" transform="rotate(216)"/>
    <ellipse cx="0" cy="-15" rx="7" ry="14" transform="rotate(288)"/>
  </g>
  <!-- Top label -->
  <text x="84" y="22" fill="#ffffff"
        font-family="Helvetica, Arial, sans-serif" font-size="9" letter-spacing="2.5">FLORISTIK &amp; DEKO</text>
  <!-- Wordmark blumenbar -->
  <text x="80" y="50" fill="#ffffff"
        font-family="Georgia, serif" font-style="italic" font-weight="700" font-size="22">blumen</text>
  <text x="80" y="72" fill="#ffffff"
        font-family="Georgia, serif" font-style="italic" font-weight="700" font-size="22">bar</text>
</svg>
